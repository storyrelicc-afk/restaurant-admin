<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title id="page-title">Menü</title>
<meta name="description" content="Lezzetli menümüzü keşfedin."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/lang-switcher.css"/>
<script src="/i18n.js"></script>
<style>
:root{
  --gold:#c9a84c;--gold-l:#e4c97e;--gold-d:#9a7a2e;
  --bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#222;--bg5:#2a2a2a;
  --gray:#888;--gray-l:#b0b0b0;--white:#f5f0e8;
  --fd:'Cormorant Garamond',Georgia,serif;
  --fb:'Inter',-apple-system,sans-serif;
  --nav:80px;--r:0.35s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--white);font-family:var(--fb);overflow-x:hidden;min-height:100vh}
img{max-width:100%;height:auto;display:block}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font-family:inherit}
::selection{background:var(--gold);color:var(--bg)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--gold-d);border-radius:3px}

/* Loader */
#loader{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;transition:opacity .5s,visibility .5s}
#loader.out{opacity:0;visibility:hidden;pointer-events:none}
.ld-logo{font-family:var(--fd);font-size:2rem;font-weight:300;color:var(--gold);letter-spacing:.1em;animation:glow 1.4s ease infinite alternate}
.ld-bar{width:160px;height:1px;background:var(--bg5);overflow:hidden}
.ld-prog{height:100%;background:var(--gold);animation:prog 1.4s ease forwards}
@keyframes glow{0%{color:var(--gold)}100%{color:var(--gold-l)}}
@keyframes prog{0%{width:0}100%{width:100%}}

/* Nav */
nav{position:fixed;top:0;left:0;right:0;height:var(--nav);z-index:1000;display:flex;align-items:center;padding:0 clamp(1.25rem,4vw,3rem);background:rgba(10,10,10,.92);backdrop-filter:blur(20px);box-shadow:0 1px 0 rgba(201,168,76,.12)}
.nav-i{width:100%;max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.logo{font-family:var(--fd);font-size:1.6rem;font-weight:400;letter-spacing:.04em;transition:.2s;white-space:nowrap}
.logo:hover{color:var(--gold)}
.back-link{display:flex;align-items:center;gap:.5rem;font-size:.78rem;font-weight:600;letter-spacing:.05em;color:var(--gray-l);transition:.2s}
.back-link:hover{color:var(--gold)}
.nav-right{display:flex;align-items:center;gap:.75rem}
.btn-gold{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.6rem;font-size:.72rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;background:var(--gold);color:var(--bg);border-radius:3px;transition:var(--r);border:1px solid var(--gold);white-space:nowrap}
.btn-gold:hover{background:var(--gold-l);transform:translateY(-2px);box-shadow:0 10px 30px rgba(201,168,76,.3)}
@media(max-width:640px){.btn-gold{display:none}}

/* Header / hero */
.menu-hero{padding:calc(var(--nav) + 3rem) 1.5rem 2.5rem;text-align:center;position:relative;overflow:hidden}
.menu-hero::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:600px;height:300px;background:radial-gradient(ellipse at center, rgba(201,168,76,.12) 0%, transparent 70%);pointer-events:none}
.menu-hero-eyebrow{font-size:.7rem;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:1rem;position:relative;z-index:1}
.menu-hero-title{font-family:var(--fd);font-size:clamp(2.5rem,6vw,4.5rem);font-weight:300;line-height:1;margin-bottom:.75rem;position:relative;z-index:1}
.menu-hero-sub{color:var(--gray-l);font-size:.95rem;max-width:520px;margin:0 auto;position:relative;z-index:1}

/* Container */
.container{max-width:1280px;margin:0 auto;padding:0 clamp(1.25rem,4vw,3rem)}

/* Category nav - sticky pills */
.cat-nav-wrap{position:sticky;top:var(--nav);z-index:90;background:rgba(10,10,10,.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.06);padding:1rem 0}
.cat-nav{display:flex;gap:.6rem;overflow-x:auto;padding:0 clamp(1.25rem,4vw,3rem);scrollbar-width:none}
.cat-nav::-webkit-scrollbar{display:none}
.cat-pill{display:flex;align-items:center;gap:.5rem;padding:.65rem 1.3rem;font-size:.78rem;font-weight:600;letter-spacing:.04em;color:var(--gray-l);border:1px solid rgba(255,255,255,.1);border-radius:999px;white-space:nowrap;transition:var(--r);flex-shrink:0;background:var(--bg3)}
.cat-pill:hover{border-color:var(--gold);color:var(--gold)}
.cat-pill.active{background:var(--gold);border-color:var(--gold);color:var(--bg)}
.cat-pill .ico{font-size:1rem}

/* Search */
.search-wrap{position:relative;max-width:380px;margin:2rem auto 0}
.search-input{width:100%;padding:.85rem 1.2rem .85rem 2.8rem;background:var(--bg3);border:1px solid rgba(255,255,255,.1);border-radius:999px;color:var(--white);font-size:.88rem;outline:none;transition:.2s}
.search-input:focus{border-color:var(--gold);background:rgba(201,168,76,.04)}
.search-input::placeholder{color:var(--gray)}
.search-ico{position:absolute;left:1.1rem;top:50%;transform:translateY(-50%);color:var(--gray);font-size:.95rem;pointer-events:none}

/* Menu sections by category */
.menu-content{padding:2.5rem 0 6rem}
.cat-section{margin-bottom:4rem;scroll-margin-top:calc(var(--nav) + 70px)}
.cat-section-header{display:flex;align-items:center;gap:1rem;margin-bottom:2rem}
.cat-section-ico{font-size:1.8rem}
.cat-section-title{font-family:var(--fd);font-size:clamp(1.7rem,3vw,2.4rem);font-weight:400}
.cat-section-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(201,168,76,.4),transparent)}
.cat-section-count{font-size:.75rem;color:var(--gray);letter-spacing:.05em}

.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,320px),1fr));gap:1.5rem}
.mc{background:var(--bg3);border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.05);transition:border-color var(--r), box-shadow var(--r), transform var(--r);opacity:0;transform:translateY(20px)}
.mc.show{opacity:1;transform:translateY(0)}
.mc:hover{border-color:rgba(201,168,76,.3);transform:translateY(-4px);box-shadow:0 20px 50px rgba(0,0,0,.5)}

/* Çoklu fotoğraf karuseli */
.mc-img{aspect-ratio:16/10;overflow:hidden;position:relative;background:var(--bg4)}
.mc-carousel{display:flex;width:100%;height:100%;transition:transform .35s cubic-bezier(.4,0,.2,1);touch-action:pan-y}
.mc-carousel-slide{flex:0 0 100%;width:100%;height:100%;position:relative;cursor:zoom-in}
.mc-carousel-slide img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s}
.mc:hover .mc-carousel-slide img{transform:scale(1.04)}
.mc-dots{position:absolute;bottom:.7rem;left:0;right:0;display:flex;justify-content:center;gap:.35rem;z-index:3}
.mc-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);transition:.2s;cursor:pointer}
.mc-dot.active{background:var(--gold);width:18px;border-radius:3px}
.mc-nav-arrow{position:absolute;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1rem;z-index:4;opacity:0;transition:.2s;cursor:pointer}
.mc-img:hover .mc-nav-arrow{opacity:1}
.mc-nav-prev{left:.5rem}
.mc-nav-next{right:.5rem}
.mc-nav-arrow:hover{background:rgba(201,168,76,.85);color:#000}
.mc-photo-count{position:absolute;top:.7rem;right:.7rem;background:rgba(0,0,0,.55);color:#fff;font-size:.65rem;font-weight:600;padding:.2rem .5rem;border-radius:999px;display:flex;align-items:center;gap:.25rem;z-index:3}

.mc-badge{position:absolute;top:.9rem;left:.9rem;background:var(--gold);color:var(--bg);font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.28rem .7rem;border-radius:999px;z-index:3}
.mc-body{padding:1.4rem}
.mc-row{display:flex;justify-content:space-between;align-items:flex-start;gap:.8rem;margin-bottom:.5rem}
.mc-name{font-family:var(--fd);font-size:1.25rem;font-weight:400;color:var(--white);line-height:1.2}
.mc-price{font-family:var(--fd),'Segoe UI',Arial,sans-serif;font-size:1.3rem;font-weight:500;color:var(--gold);white-space:nowrap}
.mc-desc{font-size:.85rem;color:var(--gray);line-height:1.6}

/* Lightbox (büyütülmüş görüntüleme) */
.mlb{display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.94);backdrop-filter:blur(10px);align-items:center;justify-content:center}
.mlb.open{display:flex;animation:mlbFadeIn .2s ease}
@keyframes mlbFadeIn{from{opacity:0}to{opacity:1}}
.mlb-img-wrap{max-width:92vw;max-height:88vh;position:relative}
.mlb-img-wrap img{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:8px;box-shadow:0 30px 100px rgba(0,0,0,.8);display:block}
.mlb-caption{text-align:center;margin-top:1rem;color:var(--white);font-family:var(--fd);font-size:1.2rem}
.mlb-counter{text-align:center;margin-top:.4rem;color:var(--gray);font-size:.8rem;letter-spacing:.05em}
.mlb-x{position:absolute;top:1.5rem;right:1.5rem;color:#fff;font-size:1.8rem;cursor:pointer;width:46px;height:46px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:.2s;z-index:10}
.mlb-x:hover{background:rgba(255,255,255,.1)}
.mlb-nav{position:absolute;top:50%;transform:translateY(-50%);color:#fff;font-size:1.6rem;cursor:pointer;width:50px;height:50px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);transition:.2s;z-index:10}
.mlb-nav:hover{background:rgba(201,168,76,.85);color:#000}
.mlb-prev{left:1.5rem}
.mlb-next{right:1.5rem}
@media(max-width:640px){
  .mlb-nav{width:40px;height:40px;font-size:1.3rem}
  .mlb-prev{left:.5rem}.mlb-next{right:.5rem}
  .mlb-x{top:1rem;right:1rem}
}

/* Empty state */
.empty-state{text-align:center;padding:4rem 1rem;color:var(--gray)}
.empty-state-ico{font-size:3rem;opacity:.3;margin-bottom:1rem}

/* WhatsApp floating */
.wa{position:fixed;bottom:2rem;right:2rem;width:54px;height:54px;border-radius:50%;background:#25D366;color:#fff;display:flex;align-items:center;justify-content:center;z-index:500;box-shadow:0 8px 28px rgba(37,211,102,.35);transition:var(--r);cursor:pointer}
.wa:hover{transform:scale(1.1) translateY(-2px);box-shadow:0 12px 40px rgba(37,211,102,.45)}

/* Reveal animation helper */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:768px){
  .menu-hero{padding:calc(var(--nav) + 2rem) 1.25rem 2rem}
  .cat-section-title{font-size:1.5rem}
}
</style>
</head>
<body>

<div id="loader">
  <div class="ld-logo" id="ld-logo">Yükleniyor...</div>
  <div class="ld-bar"><div class="ld-prog"></div></div>
</div>

<nav>
  <div class="nav-i">
    <a href="/" class="back-link" id="menu-back-link">
      <span>←</span> <span id="menu-back-text">Ana Sayfa</span>
    </a>
    <a href="/" class="logo" id="nav-logo"></a>
    <div class="nav-right">
      <div id="lang-switcher-container"></div>
      <a href="/#reservation" class="btn-gold" id="nav-reserve-btn">Rezervasyon</a>
    </div>
  </div>
</nav>

<header class="menu-hero">
  <span class="menu-hero-eyebrow" id="menu-hero-eyebrow">Mutfak Yolculuğu</span>
  <h1 class="menu-hero-title" id="menu-hero-title">Menümüz</h1>
  <p class="menu-hero-sub" id="menu-hero-sub"></p>
  <div class="search-wrap">
    <span class="search-ico">🔍</span>
    <input type="text" class="search-input" id="menu-search" placeholder="Ürün ara...">
  </div>
</header>

<div class="cat-nav-wrap">
  <div class="cat-nav" id="cat-nav"></div>
</div>

<main class="menu-content container">
  <div id="menu-sections"></div>
  <div class="empty-state" id="empty-state" style="display:none">
    <div class="empty-state-ico">🍽️</div>
    <p id="empty-state-text">Sonuç bulunamadı</p>
  </div>
</main>

<!-- LIGHTBOX -->
<div class="mlb" id="mlb">
  <div class="mlb-x" id="mlb-x">✕</div>
  <div class="mlb-nav mlb-prev" id="mlb-prev">‹</div>
  <div class="mlb-img-wrap">
    <img id="mlb-img" src="" alt=""/>
  </div>
  <div class="mlb-nav mlb-next" id="mlb-next">›</div>
</div>
<div style="position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);z-index:9001;text-align:center;display:none" id="mlb-meta">
  <div class="mlb-caption" id="mlb-caption"></div>
  <div class="mlb-counter" id="mlb-counter"></div>
</div>

<a class="wa" id="wa-btn" href="#" target="_blank" aria-label="WhatsApp">
  <svg width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
</a>

<script>
const API = '';
async function get(path){ const r=await fetch(API+path); return r.json(); }

let S={}, cats=[], items=[];
let activeCat = 'all';
let searchQuery = '';

async function init(){
  const safeClose = setTimeout(()=>{ const l=document.getElementById('loader'); if(l)l.classList.add('out'); }, 4000);
  try {
    [S, cats, items] = await Promise.all([
      get('/api/settings'), get('/api/menuCategories'), get('/api/menuItems')
    ]);
  } catch(e) {
    console.warn('API hatası:', e.message);
    S = {restaurantName:'', primaryColor:'#c9a84c', currency:'₺', whatsapp:''};
    cats = []; items = [];
  }
  applyBranding();
  applyUIText();
  renderCatNav();
  renderMenuSections();
  setupSearch();
  renderLangSwitcher('lang-switcher-container', onLangChange);
  clearTimeout(safeClose);
  const l=document.getElementById('loader'); if(l)l.classList.add('out');
}

function onLangChange(){
  applyUIText();
  renderCatNav();
  renderMenuSections();
  renderLangSwitcher('lang-switcher-container', onLangChange);
}

function applyBranding(){
  document.documentElement.style.setProperty('--gold', S.primaryColor||'#c9a84c');
  const name = S.restaurantName || '';
  document.title = (t('nav_menu')) + ' – ' + name;
  const pt = document.getElementById('page-title'); if(pt) pt.textContent = document.title;
  const ld = document.getElementById('ld-logo'); if(ld) ld.textContent = S.loadingText || name;
  const navLogo = document.getElementById('nav-logo');
  if(navLogo){
    if(S.logoUrl) navLogo.innerHTML = `<img src="${S.logoUrl}" alt="${name}" style="height:36px;object-fit:contain;max-width:160px"/>`;
    else navLogo.innerHTML = name.replace(/&/g,'<span style="color:var(--gold)">&amp;</span>');
  }
  const waBtn = document.getElementById('wa-btn');
  if(waBtn) waBtn.href = `https://wa.me/${(S.whatsapp||'').replace(/\D/g,'')}`;
}

function applyUIText(){
  document.documentElement.lang = getCurrentLang();
  const eb = document.getElementById('menu-hero-eyebrow'); if(eb) eb.textContent = t('menu_eyebrow');
  const tt = document.getElementById('menu-hero-title'); if(tt) tt.textContent = t('menu_title');
  const bt = document.getElementById('menu-back-text'); if(bt) bt.textContent = t('nav_home');
  const rb = document.getElementById('nav-reserve-btn'); if(rb) rb.textContent = t('nav_reserve');
  const search = document.getElementById('menu-search');
  if(search) search.placeholder = t('menu_search_ph');
  const ept = document.getElementById('empty-state-text');
  if(ept) ept.textContent = t('menu_empty');
}

function renderCatNav(){
  const activeCats = [...new Set(items.filter(i=>i.active).map(i=>i.cat))];
  const validCats = cats.filter(c=>c.active && activeCats.includes(c.slug)).sort((a,b)=>(a.order||0)-(b.order||0));
  const nav = document.getElementById('cat-nav');
  if(!nav) return;
  nav.innerHTML = `<button class="cat-pill ${activeCat==='all'?'active':''}" data-c="all">${t('menu_all_cat')}</button>`
    + validCats.map(c=>`<button class="cat-pill ${activeCat===c.slug?'active':''}" data-c="${c.slug}"><span class="ico">${c.icon||''}</span>${tf(c.name)}</button>`).join('');
  nav.querySelectorAll('.cat-pill').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      activeCat = btn.dataset.c;
      renderCatNav();
      renderMenuSections();
      if(activeCat!=='all'){
        const sec = document.getElementById('cat-sec-'+activeCat);
        if(sec) sec.scrollIntoView({behavior:'smooth', block:'start'});
      } else {
        window.scrollTo({top:0, behavior:'smooth'});
      }
    });
  });
}

function setupSearch(){
  const input = document.getElementById('menu-search');
  if(!input) return;
  input.addEventListener('input', ()=>{
    searchQuery = input.value.trim().toLowerCase();
    renderMenuSections();
  });
}

// Bir ürünün fotoğraf dizisini döndürür (images[] varsa onu, yoksa eski img tekil alanını kullanır)
function getItemImages(item){
  if(Array.isArray(item.images) && item.images.length) return item.images;
  if(item.img) return [item.img];
  return [];
}

function renderMenuSections(){
  const cur = S.currency || '₺';
  const activeCatsAll = [...new Set(items.filter(i=>i.active).map(i=>i.cat))];
  let validCats = cats.filter(c=>c.active && activeCatsAll.includes(c.slug)).sort((a,b)=>(a.order||0)-(b.order||0));
  if(activeCat !== 'all') validCats = validCats.filter(c=>c.slug===activeCat);

  const container = document.getElementById('menu-sections');
  const emptyState = document.getElementById('empty-state');
  if(!container) return;

  let anyResults = false;
  const html = validCats.map(cat=>{
    let catItems = items.filter(i=>i.active && i.cat===cat.slug).sort((a,b)=>(a.order||0)-(b.order||0));
    if(searchQuery){
      catItems = catItems.filter(i=>{
        const name = tf(i.name).toLowerCase();
        const desc = tf(i.desc).toLowerCase();
        return name.includes(searchQuery) || desc.includes(searchQuery);
      });
    }
    if(!catItems.length) return '';
    anyResults = true;
    return `
    <section class="cat-section" id="cat-sec-${cat.slug}">
      <div class="cat-section-header">
        <span class="cat-section-ico">${cat.icon||''}</span>
        <h2 class="cat-section-title">${tf(cat.name)}</h2>
        <div class="cat-section-line"></div>
        <span class="cat-section-count">${catItems.length}</span>
      </div>
      <div class="menu-grid">
        ${catItems.map(item=>{
          const imgs = getItemImages(item);
          const multi = imgs.length > 1;
          return `
          <article class="mc" data-item-id="${item.id}">
            <div class="mc-img">
              <div class="mc-carousel" data-idx="0">
                ${imgs.length ? imgs.map((src,i)=>`
                  <div class="mc-carousel-slide" data-i="${i}">
                    <img src="${src}" alt="${tf(item.name)}" loading="lazy"/>
                  </div>`).join('') : `<div class="mc-carousel-slide"><img src="" alt="${tf(item.name)}"/></div>`}
              </div>
              ${item.featured?`<span class="mc-badge">${t('menu_chef_pick')}</span>`:''}
              ${multi?`<span class="mc-photo-count">📷 ${imgs.length}</span>`:''}
              ${multi?`
                <div class="mc-nav-arrow mc-nav-prev">‹</div>
                <div class="mc-nav-arrow mc-nav-next">›</div>
                <div class="mc-dots">${imgs.map((_,i)=>`<span class="mc-dot ${i===0?'active':''}" data-i="${i}"></span>`).join('')}</div>
              `:''}
            </div>
            <div class="mc-body">
              <div class="mc-row">
                <h3 class="mc-name">${tf(item.name)}</h3>
                <span class="mc-price">${cur}${item.price}</span>
              </div>
              <p class="mc-desc">${tf(item.desc)}</p>
            </div>
          </article>`;
        }).join('')}
      </div>
    </section>`;
  }).join('');

  container.innerHTML = html;
  emptyState.style.display = anyResults ? 'none' : 'block';

  // Stagger animation
  const cards = container.querySelectorAll('.mc');
  cards.forEach((card, i)=>{
    setTimeout(()=> card.classList.add('show'), Math.min(i,12)*40);
  });

  setupCardCarousels(container);
}

// ── Kart içi swipe / ok navigasyonu ──────────────────────────
function setupCardCarousels(container){
  container.querySelectorAll('.mc').forEach(card => {
    const itemId = parseInt(card.dataset.itemId);
    const item = items.find(i=>i.id===itemId);
    const imgs = item ? getItemImages(item) : [];
    const carousel = card.querySelector('.mc-carousel');
    const dots = card.querySelectorAll('.mc-dot');
    const prevBtn = card.querySelector('.mc-nav-prev');
    const nextBtn = card.querySelector('.mc-nav-next');
    let idx = 0;

    function goTo(i){
      idx = ((i % imgs.length) + imgs.length) % imgs.length;
      carousel.style.transform = `translateX(-${idx*100}%)`;
      carousel.dataset.idx = idx;
      dots.forEach((d,j)=>d.classList.toggle('active', j===idx));
    }

    if(prevBtn) prevBtn.addEventListener('click', (e)=>{ e.stopPropagation(); goTo(idx-1); });
    if(nextBtn) nextBtn.addEventListener('click', (e)=>{ e.stopPropagation(); goTo(idx+1); });
    dots.forEach(d => d.addEventListener('click', (e)=>{ e.stopPropagation(); goTo(parseInt(d.dataset.i)); }));

    // Touch swipe desteği
    let startX = 0, isDragging = false;
    carousel.addEventListener('touchstart', e=>{ startX = e.touches[0].clientX; isDragging = true; }, {passive:true});
    carousel.addEventListener('touchend', e=>{
      if(!isDragging) return;
      const diff = e.changedTouches[0].clientX - startX;
      if(Math.abs(diff) > 40){ diff > 0 ? goTo(idx-1) : goTo(idx+1); }
      isDragging = false;
    }, {passive:true});

    // Resme tıklayınca lightbox aç
    card.querySelectorAll('.mc-carousel-slide').forEach(slide => {
      slide.addEventListener('click', (e)=>{
        e.stopPropagation();
        if(imgs.length) openLightbox(imgs, idx, tf(item.name));
      });
    });
  });
}

// ── LIGHTBOX (büyütülmüş görüntüleme) ────────────────────────
let lbImages = [];
let lbIndex = 0;
let lbCaption = '';

function openLightbox(images, startIdx, caption){
  lbImages = images;
  lbIndex = startIdx || 0;
  lbCaption = caption || '';
  updateLightboxImg();
  document.getElementById('mlb').classList.add('open');
  document.getElementById('mlb-meta').style.display = 'block';
  document.body.style.overflow = 'hidden';
}
function closeLightbox(){
  document.getElementById('mlb').classList.remove('open');
  document.getElementById('mlb-meta').style.display = 'none';
  document.body.style.overflow = '';
}
function updateLightboxImg(){
  const img = document.getElementById('mlb-img');
  if(img) img.src = lbImages[lbIndex] || '';
  const cap = document.getElementById('mlb-caption');
  if(cap) cap.textContent = lbCaption;
  const counter = document.getElementById('mlb-counter');
  if(counter) counter.textContent = lbImages.length > 1 ? `${lbIndex+1} / ${lbImages.length}` : '';
  const prevBtn = document.getElementById('mlb-prev');
  const nextBtn = document.getElementById('mlb-next');
  const showNav = lbImages.length > 1;
  if(prevBtn) prevBtn.style.display = showNav ? 'flex' : 'none';
  if(nextBtn) nextBtn.style.display = showNav ? 'flex' : 'none';
}
function lbGoTo(i){
  lbIndex = ((i % lbImages.length) + lbImages.length) % lbImages.length;
  updateLightboxImg();
}

document.getElementById('mlb-x').addEventListener('click', closeLightbox);
document.getElementById('mlb').addEventListener('click', e=>{ if(e.target===e.currentTarget) closeLightbox(); });
document.getElementById('mlb-prev').addEventListener('click', ()=> lbGoTo(lbIndex-1));
document.getElementById('mlb-next').addEventListener('click', ()=> lbGoTo(lbIndex+1));
document.addEventListener('keydown', e=>{
  if(!document.getElementById('mlb').classList.contains('open')) return;
  if(e.key==='Escape') closeLightbox();
  if(e.key==='ArrowLeft') lbGoTo(lbIndex-1);
  if(e.key==='ArrowRight') lbGoTo(lbIndex+1);
});
// Lightbox touch swipe
(function(){
  let startX = 0;
  const wrap = document.querySelector('.mlb-img-wrap');
  if(!wrap) return;
  wrap.addEventListener('touchstart', e=>{ startX = e.touches[0].clientX; }, {passive:true});
  wrap.addEventListener('touchend', e=>{
    const diff = e.changedTouches[0].clientX - startX;
    if(Math.abs(diff) > 50){ diff > 0 ? lbGoTo(lbIndex-1) : lbGoTo(lbIndex+1); }
  }, {passive:true});
})();

init();
</script>
